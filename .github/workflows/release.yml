name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS package
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt frameworks
        run: macdeployqt build/xscraper.app -verbose=1

      - name: Add license notices
        run: |
          mkdir -p build/xscraper.app/Contents/Resources/licenses
          cp LICENSE build/xscraper.app/Contents/Resources/licenses/
          cp THIRD_PARTY_NOTICES.md build/xscraper.app/Contents/Resources/licenses/
          cp -R LICENSES build/xscraper.app/Contents/Resources/licenses/

      - name: Create packages
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/xscraper.app dist/xscraper-macos.zip
          macdeployqt build/xscraper.app -dmg -verbose=1
          mv build/xscraper.dmg dist/xscraper-macos.dmg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xscraper-macos
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
